<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>休講・補講情報</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
​

<style>
body {
  margin: 0;​
  font-family: "Hiragino Kaku Gothic ProN", "Helvetica Neue", Arial, sans-serif;
  font-size: 46px;
  color: #4b3832;

  /* 背景画像 */
  background-image: url("image/bg.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* 全体レイアウト */
.wrapper {
  display: flex;
  height: calc(100vh - 240px); /* 下のフッター分引く */
  padding: 0px 20px 20px 20px;
  gap: 40px;
  box-sizing: border-box;
}

/* 白いカード */
.panel {
  width: 50%;
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;

  background: rgba(255, 255, 255, 0.92);
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* タイトル */
h1 {
  background: linear-gradient(to right, #fb923c, #f97316);
  color: white;
  text-align: center;
  padding: 5px;
  border-radius: 10px;
  font-size: 2rem;
  margin-bottom: 20px;
  font-size: 60px;
}

h2 {
  font-size: 46px;
  color: #ea580c;
  margin-top: 10px;
  border-bottom: 2px solid #ffe4cc;
}

ul {
  list-style: none;
  padding: 0;
  font-size: 46px;
}

li {
  background: #fffaf5;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ffe4cc;
  font-size: 46px;
}

/* フッター */
.footer {
  height: 180px;
  background: rgba(255,255,255,0.95);
  display: flex;
  align-items: right;
  justify-content: flex-end;
  padding: 20px 60px;
  box-sizing: border-box;
  gap: 30px
}

.footer-text {
  font-size: 46px;
  font-weight: bold;
  text-align:right;
}

.footer img {
  height: 140px;
}

.qr-box {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
</style>

</head>

<body>

<div class="wrapper">

  <div class="panel">
    <h1>休　　　講</h1>
    <div id="cancel-container"></div>
  </div>

  <div class="panel">
    <h1>補　　　講</h1>
    <div id="makeup-container"></div>
  </div>

</div>

<!-- フッター -->
<div class="footer">
  <div class="footer-text">
  詳細はこちらから➡</br>
  お気に入り登録（ブックマーク）してください
  </div>
  <div class="qr-box">
  <img src="image/qr.png" alt="QRコード">
  </div>
</div>

<script>
const apiUrl = 'https://script.google.com/macros/s/AKfycbxD6sOKTuscVaMgb60bndlaIQ8ZD_dWdSfq6Xaa_KYxuG9BDU50CTWcnzhJbAQxfAST/exec';

function isTodayOrFuture(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  today.setHours(0,0,0,0);
  return new Date(dateStr) >= today;
}

function formatJapaneseDate(dateStr) {
  const date = new Date(dateStr);
  const w = ['日','月','火','水','木','金','土'];
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${w[date.getDay()]}）`;
}

fetch(apiUrl)
.then(res => res.json())
.then(data => {

  const cancelGrouped = {};
  const makeupGrouped = {};

  data.forEach(row => {

    if (row['休講日'] && isTodayOrFuture(row['休講日'])) {
      const d = row['休講日'];
      if (!cancelGrouped[d]) cancelGrouped[d] = [];
      cancelGrouped[d].push(row);
    }

    if (row['補講日（確定）'] && isTodayOrFuture(row['補講日（確定）'])) {
      const d = row['補講日（確定）'];
      if (!makeupGrouped[d]) makeupGrouped[d] = [];
      makeupGrouped[d].push(row);
    }

  });

  renderCancel(cancelGrouped);
  renderMakeup(makeupGrouped);

});

function renderCancel(grouped) {
  const container = document.getElementById("cancel-container");
  const dates = Object.keys(grouped).sort();

  if (dates.length === 0) {
    container.innerHTML = "<p>現在予定されている休講はありません。</p>";
    return;
  }

  dates.forEach(date => {
    const h2 = document.createElement("h2");
    h2.textContent = formatJapaneseDate(date);
    container.appendChild(h2);

    const ul = document.createElement("ul");

    grouped[date].sort((a,b)=>{
      return parseInt((a['科目名']||'')[1]) - parseInt((b['科目名']||'')[1]);
    });

    grouped[date].forEach(item => {
      const raw = item['科目名'] || '';
      const period = raw.slice(1,2);
      const subject = raw.slice(3);

      const li = document.createElement("li");
      li.textContent = `${period}限 / ${subject} / ${item['教員氏名']}`;
      ul.appendChild(li);
    });

    container.appendChild(ul);
  });
}

function renderMakeup(grouped) {
  const container = document.getElementById("makeup-container");
  const dates = Object.keys(grouped).sort();

  if (dates.length === 0) {
    container.innerHTML = "<p>現在予定されている補講はありません。</p>";
    return;
  }

  dates.forEach(date => {
    const h2 = document.createElement("h2");
    h2.textContent = formatJapaneseDate(date);
    container.appendChild(h2);

    const ul = document.createElement("ul");

    grouped[date].sort((a,b)=>{
      return a['補講の時限（確定）'] - b['補講の時限（確定）'];
    });

    grouped[date].forEach(item => {
      const raw = item['科目名'] || '';
      const subject = raw.slice(3);

      const li = document.createElement("li");
      li.textContent = `${item['補講の時限（確定）']}限 / ${subject} / ${item['教員氏名']} / ${item['補講の教室（確定）']}`;
      ul.appendChild(li);
    });

    container.appendChild(ul);
  });
}

// 10分ごとリロード
setTimeout(() => location.reload(), 600000);
</script>

</body>
</html>
